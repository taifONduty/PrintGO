# Render Blueprint for PrintGO — Postgres + Go backend (Docker) + Next.js frontend.
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
#
# After the first deploy, set the cross-service URLs (they aren't known until
# the services get their *.onrender.com hostnames):
#   - printgo-frontend env  NEXT_PUBLIC_API_URL = https://printgo-backend.onrender.com
#   - printgo-backend  env  FRONTEND_URL        = https://printgo-frontend.onrender.com
#   - printgo-backend  env  SSLCOMMERZ_STORE_ID / SSLCOMMERZ_STORE_PASS (your store; sandbox: testbox / qwerty)
# Then trigger a redeploy of the frontend (NEXT_PUBLIC_* is baked at build time).
#
# PUBLIC_BASE_URL is filled automatically from RENDER_EXTERNAL_URL at runtime.

databases:
  - name: printgo-db
    plan: free
    databaseName: printgo
    user: printgo

services:
  # ── Go API (Docker, includes LibreOffice) ──────────────────────────────────
  - type: web
    name: printgo-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: printgo-db
          property: connectionString
      - key: UPLOADS_DIR
        value: /tmp/uploads
      - key: BW_RATE_TAKA
        value: "2.00"
      - key: COLOR_RATE_TAKA
        value: "5.00"
      - key: MIN_ORDER_TAKA
        value: "10.00"
      - key: SSLCOMMERZ_SANDBOX
        value: "true"
      - key: SSLCOMMERZ_STORE_ID
        sync: false # set in dashboard (sandbox: testbox)
      - key: SSLCOMMERZ_STORE_PASS
        sync: false # set in dashboard (sandbox: qwerty)
      - key: FRONTEND_URL
        sync: false # set to the frontend's https URL after first deploy

  # ── Next.js frontend (Node) ─────────────────────────────────────────────────
  - type: web
    name: printgo-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false # set to the backend's https URL, then redeploy frontend
